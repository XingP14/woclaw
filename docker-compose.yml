version: '3.8'

services:
  woclaw-hub:
    build: ./hub
    container_name: woclaw-hub
    ports:
      - "8082:8082"
      - "8083:8083"
    volumes:
      - woclaw-data:/data
    environment:
      - PORT=8082
      - REST_PORT=8083
      - HOST=0.0.0.0
      - DATA_DIR=/data
      # AUTH_TOKEN: set via -e flag or .env file. Default is for local dev only.
      # Production deployments should use: -e AUTH_TOKEN=your-secure-token
      - AUTH_TOKEN=${AUTH_TOKEN:-change-me-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  woclaw-data:
    driver: local
