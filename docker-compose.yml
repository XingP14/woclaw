version: '3.8'

services:
  clawlink-hub:
    build: ./hub
    container_name: clawlink-hub
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - clawlink-data:/data
    environment:
      - PORT=8080
      - REST_PORT=8081
      - HOST=0.0.0.0
      - DATA_DIR=/data
      - AUTH_TOKEN=${AUTH_TOKEN:-change-me-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  clawlink-data:
    driver: local
