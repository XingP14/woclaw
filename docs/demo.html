<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoClaw — Interactive Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #0f1117;
      color: #c9d1d9;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.1rem;
      color: #58a6ff;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-badge {
      background: #238636;
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 600;
    }
    header p {
      color: #8b949e;
      font-size: 0.8rem;
      margin: 0;
    }
    header a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.8rem;
      margin-left: auto;
    }
    header a:hover { text-decoration: underline; }
    main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 220px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-title {
      padding: 12px 16px 8px;
      font-size: 0.7rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .step-list { list-style: none; margin: 0; padding: 0 8px; }
    .step-item { margin-bottom: 2px; }
    .step-btn {
      width: 100%;
      background: transparent;
      border: none;
      color: #8b949e;
      text-align: left;
      padding: 8px 10px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }
    .step-btn:hover { background: #21262d; color: #c9d1d9; }
    .step-btn.active { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; }
    .step-btn.done { color: #3fb950; }
    .step-btn.done::before { content: '✓ '; font-size: 0.7rem; }
    .step-num {
      width: 18px; height: 18px; border-radius: 50%;
      background: #30363d; font-size: 0.65rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: #8b949e;
    }
    .step-btn.active .step-num { background: #1f6feb; color: #fff; }
    .step-btn.done .step-num { background: #238636; color: #fff; }
    .terminal-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow: hidden;
      gap: 12px;
    }
    .terminal {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .terminal-bar {
      background: #161b22;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }
    .terminal-title { margin-left: 8px; color: #8b949e; font-size: 0.78rem; }
    .hub-status {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      color: #3fb950; font-size: 0.72rem;
    }
    .hub-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #3fb950;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .terminal-body {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
      font-size: 0.83rem;
      line-height: 1.65;
    }
    .terminal-body::-webkit-scrollbar { width: 6px; }
    .terminal-body::-webkit-scrollbar-track { background: #0d1117; }
    .terminal-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .line { margin-bottom: 1px; white-space: pre-wrap; word-break: break-all; }
    .line.cmd-line { padding: 1px 0; }
    .cmd-wrapper { display: flex; align-items: center; width: 100%; }
    .cmd-text { flex: 1; }
    .copy-btn {
      background: transparent;
      border: 1px solid #30363d;
      color: #484f58;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.65rem;
      cursor: pointer;
      font-family: inherit;
      margin-left: 8px;
      opacity: 0;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .line:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: #8b949e; border-color: #8b949e; }
    .copy-btn.copied { color: #3fb950; border-color: #3fb950; }
    .prompt { color: #79c0ff; margin-right: 6px; user-select: none; }
    .command { color: #e6edf3; }
    .output { color: #8b949e; }
    .success { color: #3fb950; }
    .info { color: #58a6ff; }
    .dim { color: #484f58; }
    .warning { color: #d29922; }
    .error { color: #f85149; }
    .step-header { color: #f0883e; font-weight: 600; margin: 6px 0 2px; }
    .blank-line { height: 10px; }
    .comment-line { color: #484f58; font-style: italic; }
    .controls {
      display: flex; gap: 8px; align-items: center;
      flex-wrap: wrap; flex-shrink: 0;
    }
    .btn {
      background: #21262d; color: #c9d1d9;
      border: 1px solid #30363d; border-radius: 6px;
      padding: 7px 16px; font-family: inherit; font-size: 0.8rem;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: #30363d; border-color: #8b949e; }
    .btn.primary { background: #238636; color: #fff; border-color: #238636; }
    .btn.primary:hover { background: #2ea043; border-color: #2ea043; }
    .btn.danger { border-color: #f8514966; color: #f85149; }
    .btn.danger:hover { background: #f8514922; }
    .btn.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
    .speed-select {
      background: #21262d; color: #8b949e;
      border: 1px solid #30363d; border-radius: 6px;
      padding: 7px 10px; font-family: inherit; font-size: 0.8rem; cursor: pointer;
    }
    .progress-bar { flex: 1; min-width: 120px; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #58a6ff; width: 0%; transition: width 0.3s; }
    .step-indicator { color: #484f58; font-size: 0.75rem; }
    .kbd {
      background: #21262d; border: 1px solid #30363d;
      border-radius: 3px; padding: 1px 5px;
      font-size: 0.7rem; color: #8b949e;
    }
    .shortcuts { padding: 4px 16px; font-size: 0.72rem; color: #484f58; line-height: 1.9; }
    @media (max-width: 700px) { .sidebar { display: none; } main { flex-direction: column; } }
  </style>
</head>
<body>

<header>
  <h1>🦞 WoClaw <span class="header-badge">v1.0</span></h1>
  <p>Interactive Demo — Multi-Agent Communication Hub</p>
  <a href="https://github.com/XingP14/woclaw" target="_blank">📦 GitHub</a>
</header>

<main>
  <aside class="sidebar">
    <div class="sidebar-title">8 Steps</div>
    <ul class="step-list" id="stepList"></ul>
    <div class="sidebar-title" style="margin-top:8px">Keyboard</div>
    <div class="shortcuts">
      <span class="kbd">Space</span> play/pause<br>
      <span class="kbd">R</span> reset<br>
      <span class="kbd">1–8</span> jump to step<br>
      <span class="kbd">←</span><span class="kbd">→</span> prev/next step
    </div>
  </aside>

  <div class="terminal-area">
    <div class="terminal">
      <div class="terminal-bar">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
        <span class="terminal-title">Terminal — woclaw demo</span>
        <div class="hub-status"><div class="hub-dot"></div><span>live hub</span></div>
      </div>
      <div class="terminal-body" id="terminalBody"></div>
    </div>
    <div class="controls">
      <button class="btn primary" id="playBtn" onclick="play()">▶ <span id="playLabel">Play Demo</span></button>
      <button class="btn danger" onclick="reset()">↺ Reset</button>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="step-indicator" id="stepIndicator">0 / 8</span>
      <select class="speed-select" id="speedSelect" onchange="setSpeed()">
        <option value="100">0.5×</option>
        <option value="60">1×</option>
        <option value="40" selected>2×</option>
        <option value="25">3×</option>
        <option value="15">4×</option>
        <option value="8">5×</option>
      </select>
    </div>
  </div>
</main>

const allLines = [];
DEMO_STEPS.forEach((step, si) => {
  step.lineStart = allLines.length;
  step.lines.forEach(l => allLines.push({ ...l, stepIdx: si }));
  step.lineEnd = allLines.length - 1;
});

let playing = false, currentLine = 0, speed = 40;
const body = document.getElementById('terminalBody');

function initSidebar() {
  const list = document.getElementById('stepList');
  DEMO_STEPS.forEach((step, i) => {
    const li = document.createElement('li');
    li.className = 'step-item';
    li.innerHTML = `<button class="step-btn" id="stepBtn${i}" onclick="jumpToStep(${i})">
      <span class="step-num">${i + 1}</span><span>${step.title}</span>
    </button>`;
    list.appendChild(li);
  });
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderLine(item) {
  const div = document.createElement('div');
  const clsMap = { step:'step-header', cmd:'cmd-line', output:'', success:'success',
    info:'info', dim:'dim', warning:'warning', error:'error', blank:'blank-line' };
  div.className = `line ${clsMap[item.t] || ''}`;
  if (item.t === 'blank') return div;

  let html = '';
  if (item.t === 'cmd') {
    html = `<div class="cmd-wrapper"><div class="cmd-text"><span class="prompt">$ </span><span class="command">${escapeHtml(item.text)}</span></div>
      <button class="copy-btn" onclick="copyCmd(this,'${escapeHtml(item.fullCommand||item.text).replace(/'/g,"\\'")}')">copy</button></div>`;
  } else if (item.t === 'step') {
    html = escapeHtml(item.text);
  } else if (item.t === 'dim' && item.text.startsWith('#')) {
    html = `<span class="comment-line">${escapeHtml(item.text)}</span>`;
  } else {
    html = escapeHtml(item.text);
  }
  div.innerHTML = html;
  return div;
}

function updateProgress() {
  const pct = allLines.length > 0 ? (currentLine / allLines.length) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  let currentStep = 0;
  for (let i = 0; i < DEMO_STEPS.length; i++) {
    if (currentLine > DEMO_STEPS[i].lineStart) currentStep = i;
  }
  document.getElementById('stepIndicator').textContent = `${currentStep + 1} / ${DEMO_STEPS.length}`;
  DEMO_STEPS.forEach((_, i) => {
    const btn = document.getElementById('stepBtn' + i);
    if (!btn) return;
    btn.classList.remove('active', 'done');
    if (i === currentStep) btn.classList.add('active');
    else if (i < currentStep) btn.classList.add('done');
  });
}

async function play() {
  if (playing) { playing = false; updatePlayBtn('paused'); return; }
  playing = true; updatePlayBtn('playing');
  while (playing && currentLine < allLines.length) {
    const item = allLines[currentLine];
    const delay = item.delay || speed;
    body.appendChild(renderLine(item));
    body.scrollTop = body.scrollHeight;
    currentLine++;
    updateProgress();
    await new Promise(r => setTimeout(r, delay));
  }
  playing = false;
  updatePlayBtn(currentLine >= allLines.length ? 'replay' : 'paused');
}

function reset() {
  playing = false; currentLine = 0;
  body.innerHTML = '';
  updateProgress(); updatePlayBtn('play');
}

function updatePlayBtn(state) {
  const btn = document.getElementById('playBtn');
  const label = document.getElementById('playLabel');
  if (state === 'play') { btn.classList.remove('active','primary'); label.textContent = 'Play Demo'; }
  else if (state === 'playing') { btn.classList.add('active','primary'); label.textContent = 'Pause'; }
  else if (state === 'paused') { btn.classList.remove('active'); btn.classList.add('primary'); label.textContent = 'Resume'; }
  else if (state === 'replay') { btn.classList.add('primary'); btn.classList.remove('active'); label.textContent = 'Replay'; }
}

function jumpToStep(idx) {
  playing = false;
  body.innerHTML = '';
  currentLine = 0;
  DEMO_STEPS.forEach((_, i) => { const b = document.getElementById('stepBtn'+i); if(b) b.classList.remove('active','done'); });
  for (let i = 0; i < DEMO_STEPS[idx].lineStart; i++) {
    body.appendChild(renderLine(allLines[i]));
    currentLine++;
  }
  updateProgress();
  playing = true; updatePlayBtn('playing');
  autoPlay();
}

async function autoPlay() {
  while (playing && currentLine < allLines.length) {
    const item = allLines[currentLine];
    const delay = item.delay || speed;
    body.appendChild(renderLine(item));
    body.scrollTop = body.scrollHeight;
    currentLine++;
    updateProgress();
    await new Promise(r => setTimeout(r, delay));
  }
  playing = false;
  updatePlayBtn(currentLine >= allLines.length ? 'replay' : 'play');
}

function copyCmd(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1200);
  });
}

function setSpeed() { speed = parseInt(document.getElementById('speedSelect').value); }

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); play(); }
  else if (e.code === 'KeyR') reset();
  else if (e.key >= '1' && e.key <= '8') jumpToStep(parseInt(e.key) - 1);
  else if (e.code === 'ArrowRight') {
    const cs = DEMO_STEPS.findIndex(s => currentLine <= s.lineEnd);
    if (cs < DEMO_STEPS.length - 1) jumpToStep(cs + 1);
  } else if (e.code === 'ArrowLeft') {
    const cs = DEMO_STEPS.findIndex(s => currentLine <= s.lineEnd);
    if (cs > 0) jumpToStep(cs - 1);
  }
});

initSidebar();
updateProgress();
</script>
</body>
