name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: TypeScript check (hub)
        run: npx tsc --noEmit
        working-directory: hub

      - name: Build (hub)
        run: npm run build
        working-directory: hub

  plugin-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: TypeScript check (plugin)
        run: npx tsc --noEmit
        working-directory: plugin

      - name: Build (plugin)
        run: npm run build
        working-directory: plugin
